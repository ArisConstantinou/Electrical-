<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="8" fill="%23242827"/><path d="M10 42h28l10-9h8v13H10z" fill="%23d4a321"/><rect x="13" y="46" width="32" height="8" rx="4" fill="%23545c59"/></svg>' />
    <script>
      const publicEnvironmentUrl = 'https://arisconstantinou.github.io/Game/destruction-prototype/';
      const keepLocal = new URLSearchParams(window.location.search).get('local') === '1';
      const isLocalEnvironment = ['localhost', '127.0.0.1', '::1', '192.168.1.135'].includes(window.location.hostname);

      if (isLocalEnvironment && !keepLocal) {
        const targetUrl = new URL(publicEnvironmentUrl);

        targetUrl.search = window.location.search;
        targetUrl.hash = window.location.hash;
        window.location.replace(targetUrl.toString());
      }
    </script>
    <title>Bulldozer Destruction Prototype</title>
  </head>
  <body>
    <main id="app">
      <canvas id="game-canvas" aria-label="Bulldozer destruction prototype"></canvas>
      <section id="hud" aria-live="polite">
        <div class="hud-row">
          <strong>Bulldozer Physics Prototype</strong>
          <span id="fps-readout">FPS 0</span>
        </div>
        <div id="status-readout">Loading Rapier...</div>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
